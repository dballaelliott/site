<!doctype html>
<html lang="en">
  {{ partial "head.html" . }}
<body>
  <a class="skip-link" href="#main">Skip to main</a>
  {{ partial "header.html" . }}
  <div class="wrapper">
    <aside class="sidebar">
      <img class="headshot" src="/picture.jpeg" alt="Dylan Balla-Elliott">
      <div class="sidebar-meta">
        <span class="sidebar-title">PhD Candidate</span>
        <span class="sidebar-affil">Department of Economics</span>
        <span class="sidebar-affil">University of Chicago</span>
      </div>
      <div class="sidebar-contact">
        <span class="email">dbe@uchicago.edu</span>
        <a href="https://pdfs.dballaelliott.com/dbeCV.pdf" class="cv-link">[cv]</a>
      </div>
    </aside>
    <main id="main" class="main-col">
      <p class="intro">{{ .Params.intro }}</p>
      <p class="bio">{{ .Params.bio }}</p>
      {{ .Content }}
    </main>
  </div>
  {{ partial "footer.html" . }}
</body>
</html>
